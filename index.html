<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>African Crostic - Test Your Knowledge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">African Crostic</div>
        <ul class="nav-links">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#play" class="nav-link" id="navPlayBtn">Play Game</a></li>
            <li><a href="#about" class="nav-link">About</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="hero-bg">
            <div class="pattern-overlay"></div>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="letter">T</span>
                <span class="letter">e</span>
                <span class="letter">s</span>
                <span class="letter">t</span>
                <span class="divider"></span>
                <span class="letter">Y</span>
                <span class="letter">o</span>
                <span class="letter">u</span>
                <span class="letter">r</span>
                <span class="divider"></span>
                <span class="letter">K</span>
                <span class="letter">n</span>
                <span class="letter">o</span>
                <span class="letter">w</span>
                <span class="letter">l</span>
                <span class="letter">e</span>
                <span class="letter">d</span>
                <span class="letter">g</span>
                <span class="letter">e</span>
            </h1>
            <p class="hero-subtitle">Discover African Culture Through Words</p>
            <button class="cta-button" id="playButton">▶ Play Game</button>
        </div>
        <div class="decorative-elements">
            <div class="deco deco-1">◆</div>
            <div class="deco deco-2">◆</div>
            <div class="deco deco-3">◆</div>
            <div class="deco deco-4">◆</div>
        </div>
    </section>

    <!-- Game overlay container -->
    <div class="game-container" id="gameContainer">
        <div class="game-header">
            <button class="back-button" id="backButton">← Back</button>
            <h2 class="game-title" id="gameHeaderTitle">African Crostic Puzzle</h2>
        </div>

        <!-- Category selection screen -->
        <div class="category-screen" id="categoryScreen" style="display:none;">
            <div class="category-header">
                <h2 class="category-title" id="categoryTitle">Choose Your Category</h2>
            </div>
            <div class="category-grid" id="categoryGrid"></div>
        </div>

        <!-- Game puzzle screen -->
        <div class="game-screen" id="gameScreen" style="display:none;">
            <!-- Puzzle phrase at the top -->
            <div class="puzzle-phrase-container" id="puzzlePhraseContainer">
                <p class="puzzle-phrase-label">Puzzle Phrase</p>
                <div class="puzzle-phrase" id="puzzlePhrase"></div>
            </div>

            <div class="game-screen-content">
                <div class="grid-container" id="gridContainer">
                    <div class="crossword-grid" id="crosswordGrid"></div>
                </div>
                <div class="clues-panel">
                    <div class="clues-section">
                        <h3>Clues</h3>
                        <ul class="clues-list" id="cluesList"></ul>
                    </div>
                    <div class="controls">
                        <button class="control-btn" id="checkBtn">Check Answer</button>
                        <button class="control-btn" id="resetBtn">Reset Puzzle</button>
                        <button class="control-btn primary" id="nextBtn">Next Puzzle</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
